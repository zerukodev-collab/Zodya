<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zodya — Legal</title>
  <style>
    :root { --bg: #0B0120; --surface: #150530; --pink: #FF6B9D; --gold: #FDE68A; --text: #e2d8f0; --muted: #a89cc4; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px 24px; }
    h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, var(--gold), var(--pink)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .subtitle { color: var(--muted); margin-bottom: 40px; }
    .links { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    a { display: inline-block; padding: 14px 32px; background: var(--surface); border: 1px solid rgba(255,107,157,0.2); border-radius: 12px; color: var(--pink); text-decoration: none; font-weight: 600; transition: all 0.2s; }
    a:hover { border-color: var(--pink); box-shadow: 0 0 20px rgba(255,107,157,0.15); }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ Zodya</h1>
    <p class="subtitle">Tu guía estelar diaria</p>
    <div class="links">
      <a href="privacy-policy.html">Política de Privacidad</a>
      <a href="terms-of-use.html">Términos de Uso</a>
    </div>
  </div>
</body>
</html>
